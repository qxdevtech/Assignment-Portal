<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Student Assignment Portal</title>
    <link href="/src/index.css" rel="stylesheet">
  </head>
  <body class="bg-[#f8fafc] flex items-center justify-center h-screen font-sans text-[#1e293b]">
    <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm w-96">
      <div class="flex justify-center mb-6">
        <div class="bg-blue-500 w-8 h-8 rounded flex items-center justify-center text-white font-bold">E</div>
      </div>
      <h1 class="text-2xl font-bold mb-6 text-center tracking-tight">Login to EduGate</h1>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-500 mb-1">Email</label>
          <input type="email" id="email" required class="w-full border border-slate-200 rounded-md p-2 text-sm outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-500 mb-1">Password</label>
          <input type="password" id="password" required class="w-full border border-slate-200 rounded-md p-2 text-sm outline-none focus:border-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded-md text-sm font-medium hover:bg-blue-600 cursor-pointer mt-2">Login</button>
      </form>
      <div id="error-message" class="text-red-500 text-sm mt-4 hidden text-center"></div>
      <p class="mt-6 text-center text-sm text-slate-500">Don't have an account? <a href="/signup.html" class="text-blue-500 font-medium hover:underline">Sign up</a></p>
    </div>
    <script type="module" src="/js/auth.js"></script>
  </body>
</html>
